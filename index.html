<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="password-container">
        <h2>Random Password generator</h2>
        <div class="input-container">
            <input type="text" id="value" placeholder="Create Password" readonly>
            <div class="alert-container active">Password copied</div>

            <i class="fa-regular fa-copy fa-2x" onclick="copyPassword()"></i>
        </div>
        <button onclick="createPassword()" class="btn"><img class="img" src="./bolt-solid.svg" alt="">Generate </button>

    </div>
    <script src="index.js"></script>
</body>

</html>
